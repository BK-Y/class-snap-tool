<div class="form-container">
    <h2>➕添加学生</h2>
    <p style="color: #666;">学员基础信息收集</p>
    <!-- 错误提示 -->
    {% if errors %}
    <div class="error-box">
        <strong>⚠️ 提交失败，请检查以下问题：</strong>
        <ul>
            {% for error in errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <!-- 成功提示 -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="success-box">
            {{ messages[0] }}
        </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('students.add_student') }}">
        <div class="card">
            <div class="card-header">必填信息</div>
            <div class="card-body">
                <!-- 姓名（二选一必填） -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="display_name">常用称呼 <span class="required">*</span></label>
                        <input type="text" 
                               id="display_name" 
                               name="display_name" 
                               value="{{ form_data.display_name if form_data else '' }}"
                               placeholder="如：小明/ Henry">
                    </div>

                    <div class="form-group">
                        <label for="legal_name">法定姓名 <span class="required">*</span></label>
                        <input type="text" 
                               id="legal_name" 
                               name="legal_name" 
                               value="{{ form_data.legal_name if form_data else '' }}"
                               placeholder="如：张小明">
                    </div>
                </div>
                <div class="info-box">
                        <strong>注意：</strong> 常用称呼和法定姓名 <strong>至少填写一个</strong>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生日期 <span class="required">*</span></label>
                        <input name="birthday" value="{{ form_data.birthday if form_data else '' }}" placeholder="YYYY-MM-DD" />
                    </div>
                    <div class="form-group">
                        <label>性别 <span class="required">*</span></label>
                        <select name="gender">
                            <option value="">请选择</option>
                            <option value="男" {{ 'selected' if form_data and form_data.gender=='男' else '' }}>男</option>
                            <option value="女" {{ 'selected' if form_data and form_data.gender=='女' else '' }}>女</option>
                            <option value="其他" {{ 'selected' if form_data and form_data.gender=='其他' else '' }}>其他</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" id="optional_section" style="margin-top:10px;">
            <div class="card-header" onclick="toggleOptional()" style="cursor:pointer;">
                选填信息 <span id="opt_toggle">[展开]</span>
            </div>
            <div class="card-body" id="opt_body" style="display:none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>性别：</label>
                        <select name="gender">
                            <option value="">请选择</option>
                            <option value="男" {{ 'selected' if form_data and form_data.gender=='男' else '' }}>男</option>
                            <option value="女" {{ 'selected' if form_data and form_data.gender=='女' else '' }}>女</option>
                            <option value="其他" {{ 'selected' if form_data and form_data.gender=='其他' else '' }}>其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>出生日期：</label>
                        <input name="birthday" value="{{ form_data.birthday if form_data else '' }}" placeholder="YYYY-MM-DD" />
                    </div>
                </div>
                <!-- further optional fields could be added here -->
            </div>
        </div>

        <p><button type="submit" class="btn btn-primary">保存</button> <button type="button" class="btn btn-secondary" onclick="closeAddPanel()">取消</button></p>
    </form>
    <script>
    function toggleOptional(){
        const body = document.getElementById('opt_body');
        const toggle = document.getElementById('opt_toggle');
        if(body.style.display==='none'){
            body.style.display='block'; toggle.textContent='[收起]';
        } else { body.style.display='none'; toggle.textContent='[展开]'; }
    }
    </script>
</div>
