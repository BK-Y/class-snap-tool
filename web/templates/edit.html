{% extends 'base.html' %}

{% block title %}新增学员 - {{ super() }} {% endblock %}

{% block content %}
<h2> 修改学员 <u>{{ student.name_id }}</u> 信息</h2>

<form method = "POST">
		<p><label> 姓名(证件)：<input type="text" name="name_id" value="{{ student.name_id }}" required></label></p>
		<p><label> 昵称：<input type="text" name="name_nick" value="{{ student.name_nick }}" required></label></p>
		<p>
			<label> 性别：</label><br>
			<label><input type="radio" name="gender" value="男" {% if student.gender == '男' %}checked{% endif %}> 男</label>
				<label><input type="radio" name="gender" value="女" {% if student.gender == '女' %}checked{% endif %}> 女</label>
				<label><input type="radio" name="gender" value="其他" {% if student.gender == '其他' %}checked{% endif %}> 其他</label>
		</p>
		<p><label> 出生日期：<input type="date" name="birth_date" value="{{ student.birth_date }}"></label></p>
		<p><label> 学校：<input type="text" name="school" value="{{ student.school or ''}}"></label></p>

		<p><button type="submit">提交</button><a href="{{ url_for('students.index') }}"> ← 返回列表</a></p>
</form>
{% endblock %}
