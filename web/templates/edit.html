{% extends 'base.html' %}

{% block title %}新增学员 - {{ super() }} {% endblock %}

{% block content %}
<h2>修改学员 <u>{{ student.student_number }}</u> 信息</h2>

{% if errors %}
<div style="color: #b00020; margin-bottom: 10px;">
	<ul>
		{% for error in errors %}
		<li>{{ error }}</li>
		{% endfor %}
	</ul>
</div>
{% endif %}

<form method="POST">
	<p><label>法定姓名：<input type="text" name="legal_name" value="{{ student.legal_name }}" required></label></p>
	<p><label>常用称呼：<input type="text" name="display_name" value="{{ student.display_name }}" required></label></p>
	<p>
		<label>性别：</label><br>
		<label><input type="radio" name="gender" value="男" {% if student.gender == '男' %}checked{% endif %}> 男</label>
		<label><input type="radio" name="gender" value="女" {% if student.gender == '女' %}checked{% endif %}> 女</label>
		<label><input type="radio" name="gender" value="其他" {% if student.gender == '其他' %}checked{% endif %}> 其他</label>
	</p>
	<p><label>出生日期：<input type="date" name="birthday" value="{{ student.birthday or '' }}"></label></p>
	<p>
		<label>证件类型：
			<select name="doc_type">
				<option value="ID_CARD" {% if student.doc_type == 'ID_CARD' %}selected{% endif %}>身份证</option>
				<option value="PASSPORT" {% if student.doc_type == 'PASSPORT' %}selected{% endif %}>护照</option>
				<option value="OTHER" {% if student.doc_type == 'OTHER' %}selected{% endif %}>其他</option>
			</select>
		</label>
	</p>
	<p><label>证件号码：<input type="text" name="doc_number" value="{{ student.doc_number or '' }}"></label></p>

	<p><button type="submit">提交</button> <a href="{{ url_for('students.index') }}">← 返回列表</a></p>
</form>
{% endblock %}
