<form id="{{ form_id|default('classForm') }}" method="POST" action="{{ form_action|default(url_for('classes.list_classes')) }}" class="{{ form_class|default('') }}" autocomplete="off">
    <p>
        <label>班级类型：
            <select name="class_type_mode" id="class_type_mode" required>
                <option value="">请选择</option>
                <option value="regular">常规班</option>
                <option value="competition">竞赛集训</option>
                <option value="custom">自定义</option>
            </select>
        </label>
        <label>班级状态：
            <select name="class_status" required>
                <option value="planned">预开班</option>
                <option value="active" selected>正常班</option>
                <option value="completed">结课班</option>
            </select>
        </label>
        <label>期数：<input type="number" min="1" name="group_number" placeholder="如：1" required></label>
    </p>

    <div id="regular_fields" style="display: none; margin: 10px 0;">
        <label>常规班级别：
            <select name="regular_level">
                <option value="">请选择</option>
                <option value="U9B">U9B</option>
                <option value="U9A">U9A</option>
                <option value="U12B">U12B</option>
                <option value="U12A">U12A</option>
            </select>
        </label>
    </div>

    <div id="competition_fields" style="display: none; margin: 10px 0;">
        <p>
            <label>赛项：
                <select name="competition_item_mode" id="competition_item_mode">
                    <option value="">请选择</option>
                    <option value="jbc">JBC</option>
                    <option value="makex_inspire">MakeX Inspire</option>
                    <option value="makex_explorer">MakeX Explorer</option>
                    <option value="custom">自定义</option>
                </select>
            </label>
            <span id="competition_item_custom_wrap" style="display: none;">
                <input type="text" name="competition_item_custom" placeholder="请输入赛项">
            </span>
        </p>

        <p>
            <label>赛事级别录入：
                <select name="competition_event_mode" id="competition_event_mode">
                    <option value="">请选择</option>
                    <option value="jbc_preset">按 JBC 预设</option>
                    <option value="custom">自定义填写</option>
                </select>
            </label>
        </p>

        <p id="jbc_event_wrap" style="display: none;">
            <label>JBC 赛事级别：
                <select name="jbc_event">
                    <option value="">请选择</option>
                    <option value="新秀级-城市挑战赛">新秀级-城市挑战赛</option>
                    <option value="新秀级-亚洲分会">新秀级-亚洲分会</option>
                    <option value="新秀级-国际大会（中国）">新秀级-国际大会（中国）</option>
                    <option value="进阶级-城市挑战赛">进阶级-城市挑战赛</option>
                    <option value="进阶级-亚洲分会">进阶级-亚洲分会</option>
                    <option value="进阶级-国际大会（中国）">进阶级-国际大会（中国）</option>
                </select>
            </label>
        </p>

        <p id="competition_event_custom_wrap" style="display: none;">
            <label>赛事级别：<input type="text" name="competition_event_custom" placeholder="例如：区域邀请赛"></label>
        </p>
    </div>

    <div id="custom_fields" style="display: none; margin: 10px 0;">
        <p><label>自定义班级类型：<input type="text" name="class_type_custom" placeholder="例如：专题课"></label></p>
        <p><label>自定义级别：<input type="text" name="custom_level" placeholder="例如：提升1阶"></label></p>
    </div>

    <p>
        <label>授课老师：<input type="text" name="teacher" placeholder="可选"></label>
        <label>上课时间：<input type="text" name="class_time" placeholder="例如 周三 18:00-20:00"></label>
        <label>开班日期：<input type="date" name="start_date"></label>
    </p>
    <p><button type="submit" class="btn btn-primary">新增班级</button></p>
</form>
