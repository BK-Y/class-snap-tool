<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}学员管理系统{% endblock %}</title>
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            <meta name="viewport" content="width=device-width, initial-scale=1">
        }
        .container {
                <div class="row">
            max-width: 1200px;
                    <aside id="sidebar" class="col-md-3 mb-3">
            padding: 20px;
        }
                    </aside>
                    <main class="col">
        header {
                    <main class="col-12">
            margin-top: 1rem;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #e8f5e9;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
	{% include 'header.html' %}
    <div class="container">
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- detail drawer (slide‑out panel) -->


	{% include 'footer.html' %}

    <style>
        /* drawer styles */
        .drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            max-width: 90vw;
            height: 100%;
            background: #fff;
            box-shadow: -2px 0 5px rgba(0,0,0,.3);
            overflow: auto;
            transition: right .3s ease;
            z-index: 1000;
        }
        .drawer.open { right: 0; }
        .drawer .close-btn {
            display: block;
            text-align: right;
            padding: 8px;
        }
        .drawer .close-btn a { text-decoration:none; font-size:1.2em; }
        @media (max-width: 600px) {
            .drawer {
                width: 100%;
                right: -100%;
            }
        }
    </style>

    <!-- Bootstrap JS (for dropdowns, modals, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // 只用 Bootstrap modal 弹窗显示详情
    document.addEventListener('click', function(e) {
        const a = e.target.closest('a[data-load-detail]');
        if (!a) return;
        e.preventDefault();
        fetch(a.href, {headers:{'X-Requested-With':'XMLHttpRequest'}})
            .then(r => r.text())
            .then(html => {
                // 先移除已有的详情modal
                let modal = document.getElementById('studentDetailModal');
                if (modal) modal.remove();
                // 创建新modal
                const div = document.createElement('div');
                div.id = 'studentDetailModal';
                div.innerHTML = html;
                document.body.appendChild(div);
                // 兼容 Bootstrap 5 modal
                const modalEl = div.querySelector('.modal');
                if (window.bootstrap && modalEl) {
                    const bsModal = new bootstrap.Modal(modalEl);
                    bsModal.show();
                    modalEl.addEventListener('hidden.bs.modal', () => div.remove());
                }
            });
    });
    function closeDrawer() {
        // 关闭并移除 modal
        let modal = document.querySelector('#studentDetailModal .modal');
        if (modal && window.bootstrap) {
            const bsModal = bootstrap.Modal.getInstance(modal);
            if (bsModal) bsModal.hide();
        }
    }
    </script>
</body>
</html>
