<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}学员管理系统{% endblock %}</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1rem 0;
            text-align: center;
            margin-bottom: 1rem;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem 0;
            color: #777;
            border-top: 1px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #e8f5e9;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
	{% include 'header.html' %}
    <div class="container" style="display:flex;">
        <!-- sidebar area: child templates may override -->
        <aside id="sidebar" style="width:200px;flex-shrink:0;">
            {% block sidebar %}{% endblock %}
        </aside>
        <!-- main content area -->
        <div id="main_content" style="flex:1;">
            {% block content %}{% endblock %}
        </div>
    </div>

	{% include 'footer.html' %}

</body>
</html>
